services:
  - type: web
    name: bakersmania-api
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci --include=dev && npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && npm run prisma:generate && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_URL
        sync: false
